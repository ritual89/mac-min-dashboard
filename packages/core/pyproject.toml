[project]
name = "mac-mini-core"
version = "0.1.0"
description = "Shared models, SSH, scanners, severity for mac-mini-dashboard"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
    "pyyaml>=6.0",
    "paramiko>=3.5",
]

[project.scripts]
mac-mini-seed = "mac_mini_core.seed:main"

[project.optional-dependencies]
dev = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mac_mini_core"]

[tool.hatch.build.targets.wheel.force-include]
"fixtures" = "fixtures"
